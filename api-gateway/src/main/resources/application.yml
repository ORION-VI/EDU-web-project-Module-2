eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
              filters:
                - name: PreserveHostHeader
                - name: CircuitBreaker
                  args:
                    name: user-service-cb
                    fallbackUri: forward:/fallback/users
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**
              filters:
                - name: PreserveHostHeader
                - name: CircuitBreaker
                  args:
                    name: notification-service-cb
                    fallbackUri: forward:/fallback/notifications

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 20s
        permittedNumberOfCallsInHalfOpenState: 5
    instances:
      user-service-cb:
        baseConfig: default
      notification-service-cb:
        baseConfig: default

  timelimiter:
    instances:
      user-service-cb:
        timeoutDuration: 5s
      notification-service-cb:
        timeoutDuration: 5s

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, circuitbreakers
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true